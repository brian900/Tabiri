name: Tabiri Daily Digest

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    name: Send Daily Email Digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install @sendgrid/mail
      - name: Send email digest
        run: node server/digest.js
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}

  linkedin-post:
    name: Post to LinkedIn
    runs-on: ubuntu-latest
    needs: send-digest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Post to LinkedIn
        run: node server/linkedin-post.js
        env:
          LINKEDIN_TOKEN:       ${{ secrets.LINKEDIN_TOKEN_BRIAN }}
          LINKEDIN_PERSON_URN:  ${{ secrets.LINKEDIN_URN_BRIAN }}
          LINKEDIN_ARTICLE_URL: ${{ secrets.LINKEDIN_ARTICLE_URL }}

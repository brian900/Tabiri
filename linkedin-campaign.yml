name: Tabiri LinkedIn Campaign (25-29 Jun 2026)

on:
  schedule:
    - cron: "0 21 24 6 *"   # Day 1 → 25 Jun 12:00 AM EAT
    - cron: "0 21 25 6 *"   # Day 2 → 26 Jun 12:00 AM EAT
    - cron: "0 21 26 6 *"   # Day 3 → 27 Jun 12:00 AM EAT
    - cron: "0 21 27 6 *"   # Day 4 → 28 Jun 12:00 AM EAT
    - cron: "0 21 28 6 *"   # Day 5 → 29 Jun 12:00 AM EAT

  workflow_dispatch:
    inputs:
      day:
        description: "Day to post (1-5)"
        required: false
        default: ""

jobs:
  post-campaign:
    name: Post LinkedIn Campaign Day
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show schedule info
        run: |
          echo "UTC now: $(date -u)"
          echo "EAT now: $(TZ='Africa/Nairobi' date)"
          echo "Cron trigger: ${{ github.event.schedule }}"
          echo "Manual day:   ${{ github.event.inputs.day }}"

      - name: Post to LinkedIn (Tabiri.io + Brian Masakari)
        run: node server/campaign-post.js
        env:
          CAMPAIGN_DAY:          ${{ github.event.schedule }}
          MANUAL_DAY:            ${{ github.event.inputs.day }}
          LINKEDIN_TOKEN_TABIRI: ${{ secrets.LINKEDIN_TOKEN_TABIRI }}
          LINKEDIN_URN_TABIRI:   ${{ secrets.LINKEDIN_URN_TABIRI }}
          LINKEDIN_TOKEN_BRIAN:  ${{ secrets.LINKEDIN_TOKEN_BRIAN }}
          LINKEDIN_URN_BRIAN:    ${{ secrets.LINKEDIN_URN_BRIAN }}
